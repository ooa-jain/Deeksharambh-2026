<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Deeksharambh 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d2147;--gold:#e6b324;--c2:#1D9E75;--bg:#f5f4fb;--card:#fff;--border:rgba(13,33,71,0.12);--muted:#64637a;--text:#1a1a2e;--red:#D85A30}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(13,33,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(13,33,71,0.03) 1px,transparent 1px);background-size:32px 32px}
.card{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(13,33,71,0.12);border:1px solid var(--border)}
.logo-wrap{display:flex;justify-content:center;margin-bottom:1.5rem}
.logo-bg{background:linear-gradient(135deg,#0a1628,#0d2147);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:10px}
.logo-bg img{height:28px;object-fit:contain}
.logo-label{color:#f0c842;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
h1{font-size:20px;font-weight:700;color:var(--text);text-align:center;margin-bottom:.3rem}
.sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg);color:var(--text)}
input:focus{border-color:var(--navy)}
.error{background:#fef2ee;border:1px solid rgba(216,90,48,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:1rem}
button{width:100%;padding:13px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 4px 14px rgba(13,33,71,0.2)}
button:hover{background:#0a1628;transform:translateY(-1px)}
.footer{text-align:center;margin-top:1.25rem;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-bg">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="JAIN University"
           onerror="this.style.display='none'">
      <div class="logo-label">OoA Admin</div>
    </div>
  </div>
  <h1>Team Dashboard</h1>
  <p class="sub">Deeksharambh 2026 · Office of Academics</p>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign in →</button>
  </form>
  <div class="footer">JAIN (Deemed-to-be University) · Confidential</div>
</div>
</body>
</html>
